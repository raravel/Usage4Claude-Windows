name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore src/Usage4Claude/Usage4Claude.csproj

    - name: Build
      run: dotnet build src/Usage4Claude/Usage4Claude.csproj --configuration Release --no-restore

    - name: Publish (framework-dependent)
      run: dotnet publish src/Usage4Claude/Usage4Claude.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish/win-x64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Usage4Claude-win-x64
        path: publish/win-x64/
        retention-days: 30
