name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore src/Usage4Claude/Usage4Claude.csproj

    - name: Publish (framework-dependent)
      run: dotnet publish src/Usage4Claude/Usage4Claude.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish/framework-dependent

    - name: Publish (self-contained)
      run: dotnet publish src/Usage4Claude/Usage4Claude.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o publish/self-contained

    - name: Create ZIP archives
      shell: pwsh
      run: |
        Compress-Archive -Path publish/framework-dependent/* -DestinationPath Usage4Claude-${{ github.ref_name }}-win-x64.zip
        Compress-Archive -Path publish/self-contained/* -DestinationPath Usage4Claude-${{ github.ref_name }}-win-x64-self-contained.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Usage4Claude-${{ github.ref_name }}-win-x64.zip
          Usage4Claude-${{ github.ref_name }}-win-x64-self-contained.zip
        generate_release_notes: true
        draft: false
