# REVIEW: PASS - 완료조건 충족. cargo check, clippy(-D warnings), npm run check(svelte-check), npm run build 모두 포함. PR 대상 main 브랜치로 정확히 설정됨.
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Svelte check
        run: npm run check

      - name: Build frontend
        run: npm run build
